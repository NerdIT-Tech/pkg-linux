name: Package Repository Manager

on:
  push:
    branches:
      - main
    paths:
      - 'incoming/**'
      - 'docs/**'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/package-repo.yml'
      - 'mkdocs.yml'
  workflow_dispatch:

jobs:
  process-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (main)
        uses: actions/checkout@v3

      - name: Checkout existing repo (gh-pages)
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: old-gh-pages
        continue-on-error: true

      - name: Sync existing repository state
        run: |
          mkdir -p repo
          if [ -d "old-gh-pages/repo" ]; then
            echo "Syncing existing repository state from gh-pages..."
            if command -v rsync >/dev/null 2>&1; then
              rsync -av old-gh-pages/repo/ repo/
            else
              cp -rp old-gh-pages/repo/. repo/
            fi
          fi
          rm -rf old-gh-pages

      - name: Process Incoming Packages
        run: |
          chmod +x scripts/*.sh
          ./scripts/process_incoming.sh

      - name: Install Repo Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Re-index Repository
        run: ./scripts/re-index.sh

      - name: Generate Package Index
        run: ./scripts/generate_index.sh

      - name: Sign Repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: ./scripts/sign-repo.sh

      - name: Build Documentation (MkDocs)
        run: |
          mkdocs build --site-dir dist

      - name: Prepare Repository Deployment
        run: |
          # Copy repository contents into the built site
          mkdir -p dist/repo dist/site
          cp -rp repo/. dist/repo/
          
          # Move packages.json to the location expected by the search script
          cp site/packages.json dist/site/packages.json
          
          # Generate HTML directory indexes for the repo portion
          ./scripts/generate_directory_listings.sh dist/repo/
          
          # Copy public keys for easy access
          cp repo/public.gpg dist/public.gpg 2>/dev/null || true
          cp repo/public.asc dist/public.asc 2>/dev/null || true
          cp repo/alpine.rsa.pub dist/alpine.rsa.pub 2>/dev/null || true
          
          # Explicitly disable Jekyll for the final deployment
          echo "jekyll: false" > dist/_config.yml
          touch dist/.nojekyll

      - name: Deploy documentation
        run: |
          mkdocs gh-deploy --force
