name: Package Repository Manager

on:
  push:
    branches:
      - main
    paths:
      - 'incoming/**'
      - 'docs/**'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/package-repo.yml'
  workflow_dispatch:

jobs:
  process-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository (main)
        uses: actions/checkout@v3

      - name: Checkout existing repo (gh-pages)
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: old-gh-pages
        continue-on-error: true

      - name: Sync existing repository state
        run: |
          mkdir -p repo
          if [ -d "old-gh-pages/repo" ]; then
            echo "Syncing existing repository state from gh-pages..."
            # Using rsync if available, otherwise cp -rp
            if command -v rsync >/dev/null 2>&1; then
              rsync -av old-gh-pages/repo/ repo/
            else
              cp -rp old-gh-pages/repo/. repo/
            fi
            echo "Current repo structure after sync:"
            find repo -maxdepth 2
          else
            echo "No existing repository found on gh-pages branch."
          fi
          rm -rf old-gh-pages

      - name: Process Incoming Packages
        run: |
          chmod +x scripts/*.sh
          ./scripts/process_incoming.sh

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils createrepo-c
          # Alpine tools would be installed here or run in a container

      - name: Re-index Repository
        run: ./scripts/re-index.sh

      - name: Generate Package Index
        run: ./scripts/generate_index.sh

      - name: Sign Repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          RSA_PRIVATE_KEY: ${{ secrets.RSA_PRIVATE_KEY }}
        run: ./scripts/sign-repo.sh

      - name: Prepare Deployment
        run: |
          echo "Preparing deployment directory..."
          mkdir -p dist/site dist/docs dist/repo
          
          # Disable Jekyll and ensure all files are included
          echo "include: [\"repo\", \"docs\", \"site\"]" > dist/_config.yml
          echo "jekyll: false" >> dist/_config.yml
          touch dist/.nojekyll
          
          # Copy static site files
          cp site/index.html dist/index.html
          cp site/packages.json dist/site/packages.json
          
          # Copy repository contents (including synced and new packages)
          cp -rp repo/. dist/repo/
          
          # Copy documentation
          cp -rp docs/. dist/docs/
          
          # Generate HTML directory indexes for the dist/repo/ directory
          chmod +x scripts/generate_directory_listings.sh
          ./scripts/generate_directory_listings.sh dist/repo/
          
          # Copy public keys to root for easy user access
          cp repo/public.gpg dist/public.gpg 2>/dev/null || true
          cp repo/public.asc dist/public.asc 2>/dev/null || true
          cp repo/alpine.rsa.pub dist/alpine.rsa.pub 2>/dev/null || true
          
          echo "Final structure of dist directory ready for deployment:"
          find dist -maxdepth 3

      - name: Verify Deployment Structure
        run: |
          if [ ! -f dist/repo/index.html ]; then
            echo "Error: dist/repo/index.html was not generated!"
            exit 1
          fi
          # Check if at least one distribution directory has an index.html
          if [ ! -f dist/repo/debian/index.html ] && [ ! -f dist/repo/redhat/index.html ] && [ ! -f dist/repo/alpine/index.html ]; then
             echo "Warning: No distribution index.html found. Repository might be empty."
          fi
          echo "Verification successful."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          enable_jekyll: false
